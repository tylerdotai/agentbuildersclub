name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm exec vitest run
      - run: pnpm run build
